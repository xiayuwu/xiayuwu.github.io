---
layout: default
---
<article class="post-page post-shell">
  <header class="glass-panel post-header reveal">
    <p class="overline"><a href="{{ '/' | relative_url }}">返回夏鱼屋</a></p>
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.description %}
      <p class="post-lead">{{ page.description }}</p>
    {% endif %}
    <div class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: '%Y 年 %m 月 %d 日' }}</time>
      {% if page.categories and page.categories.size > 0 %}
        <span>{{ page.categories | first }}</span>
      {% endif %}
    </div>
  </header>

  <section class="glass-panel post-content-wrap reveal">
    <div class="post-content">{{ content }}</div>
  </section>

  <footer class="glass-panel post-end reveal">
    <span>END</span>
    <p>谢谢你读到这里。</p>
  </footer>
</article>
