---
layout: default
---
<article class="post shell-narrow">
  <header class="post-header">
    <a class="eyebrow" href="{{ '/' | relative_url }}">← 返回文章</a>
    <h1>{{ page.title }}</h1>
    {% if page.description %}<p class="post-lead">{{ page.description }}</p>{% endif %}
    <div class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: '%Y 年 %m 月 %d 日' }}</time>
      {% if page.categories %}<span>{{ page.categories | join: ' · ' }}</span>{% endif %}
    </div>
  </header>
  <div class="post-content">{{ content }}</div>
  <footer class="post-end">
    <span>END</span>
    <p>谢谢你读到这里。</p>
  </footer>
</article>
