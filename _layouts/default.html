<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#08111f">
    {% seo %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    {% feed_meta %}
  </head>
  <body>
    <div class="site-backdrop" aria-hidden="true">
      <canvas class="cosmos-canvas" data-cosmos></canvas>
      <div class="aurora aurora-a"></div>
      <div class="aurora aurora-b"></div>
      <div class="aurora aurora-c"></div>
      <div class="nebula nebula-a"></div>
      <div class="nebula nebula-b"></div>
      <div class="moon-glow"></div>
      <div class="starfield"></div>
      <div class="shooting-star-layer" data-shooting-stars></div>
      <div class="firefly-layer" data-fireflies></div>
      <div class="cursor-trail-layer" data-cursor-trail></div>
      <div class="grid-glow"></div>
    </div>
    <div class="scroll-progress" aria-hidden="true"><span data-scroll-progress></span></div>

    <header class="site-header">
      <div class="shell nav-shell glass-strip">
        <a class="brand" href="{{ '/' | relative_url }}" aria-label="返回夏鱼屋首页">
          <span class="brand-mark">夏</span>
          <span class="brand-copy">
            <strong>夏鱼屋</strong>
            <small>XIAYUWU</small>
          </span>
        </a>

        <nav class="site-nav" aria-label="主导航">
          <a href="{{ '/' | relative_url }}">首页</a>
          <a href="{{ '/archive/' | relative_url }}">归档</a>
          <a href="{{ '/' | relative_url }}#photos">照片墙</a>
          <a href="{{ '/' | relative_url }}#music">音乐</a>
          <a href="{{ '/' | relative_url }}#talks">说说</a>
          <a href="{{ '/' | relative_url }}#essays">杂谈</a>
          <a href="{{ '/' | relative_url }}#links">友链</a>
          <a href="{{ '/about/' | relative_url }}">关于</a>
        </nav>

        <button class="theme-toggle" type="button" aria-label="切换日夜模式" title="切换日夜模式">
          <span class="theme-toggle-icon theme-toggle-sun">☼</span>
          <span class="theme-toggle-icon theme-toggle-moon">☾</span>
        </button>
      </div>
    </header>

    <main class="site-main">
      {{ content }}
    </main>

    <footer class="site-footer shell">
      <div class="glass-panel footer-panel">
        <p>夏鱼屋是一页会慢慢长出内容的个人主页。现在的视觉与交互由 Codex 搭建，之后会继续被你的文章和记忆填满。</p>
        <div class="footer-links">
          <span>© {{ 'now' | date: '%Y' }} 夏鱼屋</span>
          <a href="https://github.com/{{ site.author.github }}">GitHub</a>
          <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
        </div>
      </div>
    </footer>

    <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
  </body>
</html>
